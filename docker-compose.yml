version: '3.8'

services:
  # Vulcan Core API
  vulcan-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: vulcan-api
    ports:
      - "8000:8000"
    environment:
      - VULCAN_HOST=0.0.0.0
      - VULCAN_PORT=8000
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - LOG_LEVEL=INFO
    volumes:
      - ./config:/app/config:ro
      - ~/.hermes:/root/.hermes:ro
    restart: unless-stopped
    networks:
      - vulcan-net

  # Vulcan WebUI
  vulcan-webui:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: vulcan-webui
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    depends_on:
      - vulcan-api
    restart: unless-stopped
    networks:
      - vulcan-net

networks:
  vulcan-net:
    driver: bridge
